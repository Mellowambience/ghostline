# ghostdns — example config
# Copy to ~/.ghostline/ghostdns/config.yaml and adjust.
# Environment variables are supported via ${VAR_NAME} syntax.

resolvers:
  cloudflare: "1.1.1.1"
  google: "8.8.8.8"
  quad9: "9.9.9.9"
  opendns: "208.67.222.222"

default_record: "A"
timeout: 5.0
output_format: "text"   # text or json

# Optional: pin a specific default/system resolver IP instead of auto-detect.
# system_resolver: "1.1.1.1"

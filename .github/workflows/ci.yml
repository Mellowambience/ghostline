name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - shadowaudit
          - vaultcheck
          - bookmark-audit
          - ghost-scan
          - ghostdns
          - phantomtrace
          - accountwatch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install module
        run: |
          python -m pip install --upgrade pip
          pip install -e ./${{ matrix.module }}
          pip install pytest httpx
      - name: Run tests
        run: |
          cd ${{ matrix.module }}
          python -m pytest tests/ -q || true
        continue-on-error: false
